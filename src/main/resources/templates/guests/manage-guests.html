<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body id="page-top">
<div id="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="~{fragments/topbar :: topbar}"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800">Guests</h1>
                <div class="row">
                    <div class="col-lg-4">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary" th:text="${guest.id != 0 ? 'Edit guest' : 'Add guest'}"></h6></div>
                            <div class="card-body">
                                <div th:replace="~{fragments/message :: message}"></div>
                                <form th:action="@{/guests/save}" th:object="${guest}" method="post">
                                    <input type="hidden" th:field="*{id}">
                                    <div class="form-row">
                                        <div class="form-group col-md-6"><label>First name</label><input class="form-control" th:field="*{firstName}" required></div>
                                        <div class="form-group col-md-6"><label>Last name</label><input class="form-control" th:field="*{lastName}" required></div>
                                    </div>
                                    <div class="form-group"><label>Phone</label><input class="form-control" th:field="*{phone}" required></div>
                                    <div class="form-group"><label>Email</label><input type="email" class="form-control" th:field="*{email}"></div>
                                    <div class="form-group"><label>ID card / passport</label><input class="form-control" th:field="*{identityNumber}" required></div>
                                    <button class="btn btn-success btn-icon-split" type="submit"><span class="icon text-white-50"><i class="fas fa-save"></i></span><span class="text">Save guest</span></button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h6 class="m-0 font-weight-bold text-primary">Guest directory</h6>
                                    <form class="form-inline" method="get" th:action="@{/guests/manage-guests}">
                                        <input class="form-control form-control-sm mr-2" type="text" name="keyword" th:value="${keyword}" placeholder="Search guests">
                                        <button class="btn btn-primary btn-sm" type="submit">Search</button>
                                    </form>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-bordered">
                                        <thead>
                                        <tr>
                                            <th>Guest</th>
                                            <th>Contact</th>
                                            <th>Identity</th>
                                            <th>Stay history</th>
                                            <th>Actions</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="guestItem : ${list}">
                                            <td th:text="${guestItem.fullName()}"></td>
                                            <td>
                                                <div th:text="${guestItem.phone}"></div>
                                                <div class="small text-muted" th:text="${guestItem.email}"></div>
                                            </td>
                                            <td th:text="${guestItem.identityNumber}"></td>
                                            <td>
                                                <div th:text="${(guestBookingCounts[guestItem.id] != null ? guestBookingCounts[guestItem.id] : 0) + ' booking(s)'}" ></div>
                                                <div class="small text-muted" th:if="${guestLatestStatuses[guestItem.id] != null}" th:text="${'Latest: ' + guestLatestStatuses[guestItem.id]}"></div>
                                            </td>
                                            <td>
                                                <a class="btn btn-warning btn-circle btn-sm" th:href="@{/guests/manage-guests(editId=${guestItem.id})}"><i class="fas fa-edit"></i></a>
                                                <a class="btn btn-danger btn-circle btn-sm" th:href="@{/guests/delete(id=${guestItem.id})}"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:insert="~{fragments/footer :: footer}"></div>
    </div>
</div>
<div th:insert="~{fragments/scrolltop :: scrolltop}"></div>
<script th:replace="~{fragments/script :: script}"></script>
</body>
</html>
