<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/head :: head}"></div>
</head>
<body id="page-top">
<div id="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <div th:replace="~{fragments/topbar :: topbar}"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800">Rooms</h1>
                <div class="row">
                    <div class="col-lg-4">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3">
                                <h6 class="m-0 font-weight-bold text-primary" th:text="${room.id != 0 ? 'Edit room' : 'Add room'}"></h6>
                            </div>
                            <div class="card-body">
                                <div th:replace="~{fragments/message :: message}"></div>
                                <form th:action="@{/rooms/save}" th:object="${room}" method="post">
                                    <input type="hidden" th:field="*{id}">
                                    <div class="form-group">
                                        <label>Room number</label>
                                        <input class="form-control" th:field="*{roomNumber}" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Room type</label>
                                        <select class="form-control" th:field="*{roomType}" required>
                                            <option value="">Select room type</option>
                                            <option th:each="type : ${roomTypes}" th:value="${type.id}" th:text="${type.name}"></option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Status</label>
                                        <select class="form-control" th:field="*{status}">
                                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                                        </select>
                                    </div>
                                    <button class="btn btn-success btn-icon-split" type="submit"><span class="icon text-white-50"><i class="fas fa-save"></i></span><span class="text">Save room</span></button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3">
                                <h6 class="m-0 font-weight-bold text-primary">Room inventory</h6>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-bordered">
                                        <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Room</th>
                                            <th>Type</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="roomItem : ${list}">
                                            <td th:text="${roomItem.id}"></td>
                                            <td th:text="${roomItem.roomNumber}"></td>
                                            <td>
                                                <strong th:text="${roomItem.roomType != null ? roomItem.roomType.name : '-'}"></strong>
                                                <div class="small text-muted" th:text="${roomItem.roomType != null ? roomItem.roomType.description : ''}"></div>
                                            </td>
                                            <td><span class="badge badge-info" th:text="${roomItem.status}"></span></td>
                                            <td>
                                                <a class="btn btn-warning btn-circle btn-sm" th:href="@{/rooms/manage-rooms(editId=${roomItem.id})}"><i class="fas fa-edit"></i></a>
                                                <a class="btn btn-danger btn-circle btn-sm" th:href="@{/rooms/delete(id=${roomItem.id})}"><i class="fas fa-trash"></i></a>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:insert="~{fragments/footer :: footer}"></div>
    </div>
</div>
<div th:insert="~{fragments/scrolltop :: scrolltop}"></div>
<script th:replace="~{fragments/script :: script}"></script>
</body>
</html>
